services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    image: goholo/ros2-jazzy-abb:latest
    container_name: goholo_ros2
    hostname: goholo-ros2
    stdin_open: true
    tty: true
    network_mode: host
    privileged: true
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - DISPLAY=${DISPLAY:-host.docker.internal:0.0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - ../ros2:/ros2_ws/src:rw
      - ros2_build:/ros2_ws/build
      - ros2_install:/ros2_ws/install
      - ros2_log:/ros2_ws/log
    working_dir: /ros2_ws
    command: bash

volumes:
  ros2_build:
  ros2_install:
  ros2_log:
